# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, space-separated, used to search for modules
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to allow in a "slug"
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded that are
# not on sys.path
# allow_empty_history = false

# version locations - for when migrations are split up
# version_locations = %(here)s/bar:%(here)s/bat:version_locations

# version path separator; defaults to OS line separator
# version_path_separator = :

# set to 'true' to enable searching for version files recursively
# recursive_version_locations = false

# the output encoding used when writing new migration files
# output_encoding = utf-8

sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/crawler_db

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
